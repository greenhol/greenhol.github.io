<style>
    .config-overlay--gone {
        display: none;
    }

    .config-overlay-button {
        height: 22px;
        width: 100px;
        line-height: 22px;
        background-color: #eef;
        border: 1px solid black;
        text-align: center;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        -ms-user-select: none;
    }

    .config-overlay-button:hover {
        -moz-box-shadow: 0 0 5px #aaf;
        -webkit-box-shadow: 0 0 5px #aaf;
        box-shadow: 0 0 5px #aaf;
    }

    .config-overlay-labels {
        font-size: 16px;
        font-family: Arial, Helvetica, sans-serif;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    #config-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(4px);
        z-index: 1000;
    }

    #config-overlay-content {
        position: relative;
        background-color: rgba(255, 255, 255);
        padding: 24px;
        margin: 24px 36px;
        width: 400px;
        border: 1px solid black;
    }

    #config-overlay-close-button {
        position: relative;
        margin-bottom: 8px;
    }

    #config-overlay-apply-button {
        position: relative;
        margin: 8px;
    }

    #config-overlay-dynamic-content {
        position: relative;
        width: 400px;
        line-height: 30px;
        border: 0.5px solid #eef;
    }

    .config-overlay-grid {
        display: grid;
        grid-template-columns: 140px 220px;
        column-gap: 8px;
        align-items: center;
        padding: 8px;
    }

    .config-overlay-item {
        display: contents;
    }

    .config-overlay-item>label {
        grid-column: 1;
        text-align: right;
    }

    .config-overlay-item>input[type="number"],
    .config-overlay-item>select {
        grid-column: 2;
        font-size: 16px;
        font-family: Arial, Helvetica, sans-serif;
    }

    .config-overlay-item>input[type="checkbox"] {
        grid-column: 2;
        width: 18px;
        height: 18px;
        cursor: pointer;
        appearance: auto;
    }

    /* .config-overlay-item>.config-overlay-description {
        grid-column: 3;
        text-align: left;
    } */
</style>

<div id="config-overlay" class="config-overlay--gone">
    <div id="config-overlay-content">
        <div id="config-overlay-close-button" class="config-overlay-button">Close</div>
        <div id="config-overlay-dynamic-content"></div>
    </div>
</div>
